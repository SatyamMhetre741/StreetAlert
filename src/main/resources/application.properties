spring.application.name=Street-Alert

aws.secretsmanager.region=ap-south-1
aws.secretsmanager.secret-name=prod/app/newsAPI
aws.secretsmanager.api-key-field=apiKey

spring.datasource.url=jdbc:postgresql://localhost:5432/market
spring.datasource.username=postgres
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# Server
server.port=8080

security.jwt.secret=SomeRandomShitIWroteWhileMakingThisApp
security.jwt.expiration-ms=86400000

# News API
news.api.key=${NEWS_API_KEY:5da33f410b0248d181029275cd5971fd}
news.api.url=https://newsapi.org/v2/top-headlines
news.fetch.interval-ms=3600000

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6379
